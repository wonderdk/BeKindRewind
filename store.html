<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeKindRewind Video Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #backButton {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFD600;
            border: 2px solid #FFD600;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border-radius: 4px;
            z-index: 10;
            transition: all 0.3s;
        }

        #backButton:hover {
            background: #FFD600;
            color: #000;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #FFD600;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FFD600;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 1px solid #FFD600;
            z-index: 5;
            pointer-events: none;
        }

        #genreLabel {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD600;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border: 1px solid #FFD600;
            z-index: 5;
            pointer-events: none;
            display: none;
            white-space: nowrap;
        }

        #detailPanel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }

        #detailContent {
            background: #0f1628;
            border: 3px solid #FFD600;
            border-radius: 8px;
            padding: 40px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(255, 214, 0, 0.4);
        }

        #detailContent h2 {
            color: #FFD600;
            margin-bottom: 20px;
            font-size: 28px;
        }

        #detailContent p {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.6;
        }

        #detailContent strong {
            color: #FFD600;
        }

        #closeButton {
            color: #FFD600;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: underline;
        }

        #joystick {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #FFD600;
            border-radius: 50%;
            display: none;
            z-index: 5;
        }

        #joystick.mobile {
            display: block;
        }

        #joystickStick {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #FFD600;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <a id="backButton" href="index.html">← Back to Collection</a>
    <div id="crosshair"></div>
    <div id="instructions">Click to explore | WASD to move | ESC to release</div>
    <div id="genreLabel"></div>
    <div id="detailPanel">
        <div id="detailContent">
            <h2 id="detailTitle">DVD Case</h2>
            <p><strong>Genre:</strong> <span id="detailGenre">Unknown</span></p>
            <p>Classic film from the BeKindRewind collection.</p>
            <p id="closeButton">Click anywhere to close</p>
        </div>
    </div>
    <div id="joystick">
        <div id="joystickStick"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 80, 120);

        const canvas = document.createElement('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(canvas);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 35);

        // Store Constants
        const STORE_WIDTH = 60;
        const STORE_DEPTH = 40;
        const CEILING_HEIGHT = 4.5;
        const FLOOR_Y = 0;

        // Colors
        const BLOCKBUSTER_YELLOW = 0xFFD600;
        const BLOCKBUSTER_NAVY = 0x003087;
        const DARK_FLOOR = 0x2a2a2a;
        const WOOD_COLOR = 0x8B5E3C;
        const LIGHT_GREY = 0xcccccc;
        const DARK_GREY = 0x555555;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333322, 0.4);
        scene.add(ambientLight);

        // ===== ENVIRONMENT =====

        // Floor
        const floorGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_DEPTH);
        const floorMaterial = new THREE.MeshLambertMaterial({ color: DARK_FLOOR });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = FLOOR_Y;
        floor.receiveShadow = true;
        scene.add(floor);

        // Floor tiles pattern
        const tileSize = 3;
        const floorTiles = new THREE.Group();
        const darkerTile = 0x1a1a1a;
        for (let x = -STORE_WIDTH / 2; x < STORE_WIDTH / 2; x += tileSize) {
            for (let z = -STORE_DEPTH / 2; z < STORE_DEPTH / 2; z += tileSize) {
                const tileGeo = new THREE.PlaneGeometry(tileSize - 0.05, tileSize - 0.05);
                const tileMat = new THREE.MeshLambertMaterial({
                    color: ((Math.floor(x / tileSize) + Math.floor(z / tileSize)) % 2 === 0) ? DARK_FLOOR : darkerTile
                });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.position.set(x + tileSize / 2, FLOOR_Y + 0.01, z + tileSize / 2);
                tile.rotation.x = -Math.PI / 2;
                floorTiles.add(tile);
            }
        }
        scene.add(floorTiles);

        // Ceiling
        const ceilingGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_DEPTH);
        const ceilingMaterial = new THREE.MeshLambertMaterial({ color: LIGHT_GREY });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = CEILING_HEIGHT;
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // Ceiling tiles
        const ceilingTiles = new THREE.Group();
        const cTileSize = 6;
        const darkGrey = 0xaaaaaa;
        for (let x = -STORE_WIDTH / 2; x < STORE_WIDTH / 2; x += cTileSize) {
            for (let z = -STORE_DEPTH / 2; z < STORE_DEPTH / 2; z += cTileSize) {
                const tileGeo = new THREE.PlaneGeometry(cTileSize - 0.15, cTileSize - 0.15);
                const tileMat = new THREE.MeshLambertMaterial({ color: darkGrey });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.position.set(x + cTileSize / 2, CEILING_HEIGHT - 0.05, z + cTileSize / 2);
                tile.rotation.x = Math.PI / 2;
                ceilingTiles.add(tile);
            }
        }
        scene.add(ceilingTiles);

        // Walls
        const wallHeight = CEILING_HEIGHT;
        const wallLowerHeight = wallHeight * 0.6; // 60% = navy
        const wallUpperHeight = wallHeight * 0.4; // 40% = yellow
        const stripeY = wallLowerHeight;

        // Back wall
        const backWallLowerGeo = new THREE.PlaneGeometry(STORE_WIDTH, wallLowerHeight);
        const backWallLowerMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_NAVY });
        const backWallLower = new THREE.Mesh(backWallLowerGeo, backWallLowerMat);
        backWallLower.position.set(0, wallLowerHeight / 2, STORE_DEPTH / 2);
        backWallLower.castShadow = true;
        backWallLower.receiveShadow = true;
        scene.add(backWallLower);

        const backWallUpperGeo = new THREE.PlaneGeometry(STORE_WIDTH, wallUpperHeight);
        const backWallUpperMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });
        const backWallUpper = new THREE.Mesh(backWallUpperGeo, backWallUpperMat);
        backWallUpper.position.set(0, wallLowerHeight + wallUpperHeight / 2, STORE_DEPTH / 2);
        backWallUpper.castShadow = true;
        backWallUpper.receiveShadow = true;
        scene.add(backWallUpper);

        // Back wall stripe
        const stripeGeo = new THREE.PlaneGeometry(STORE_WIDTH, 0.1);
        const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const backStripe = new THREE.Mesh(stripeGeo, stripeMat);
        backStripe.position.set(0, stripeY + 0.05, STORE_DEPTH / 2 + 0.01);
        backStripe.castShadow = true;
        scene.add(backStripe);

        // Front wall (with entrance opening)
        const entranceWidth = 10;
        const frontWallOffset = entranceWidth / 2 + 5;

        const frontWallLeftGeo = new THREE.PlaneGeometry(STORE_WIDTH / 2 - frontWallOffset, wallLowerHeight);
        const frontWallLeftLowerMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_NAVY });
        const frontWallLeftLower = new THREE.Mesh(frontWallLeftGeo, frontWallLeftLowerMat);
        frontWallLeftLower.position.set(-STORE_WIDTH / 4 - frontWallOffset / 2, wallLowerHeight / 2, -STORE_DEPTH / 2);
        frontWallLeftLower.castShadow = true;
        frontWallLeftLower.receiveShadow = true;
        scene.add(frontWallLeftLower);

        const frontWallRightGeo = new THREE.PlaneGeometry(STORE_WIDTH / 2 - frontWallOffset, wallLowerHeight);
        const frontWallRightLowerMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_NAVY });
        const frontWallRightLower = new THREE.Mesh(frontWallRightGeo, frontWallRightLowerMat);
        frontWallRightLower.position.set(STORE_WIDTH / 4 + frontWallOffset / 2, wallLowerHeight / 2, -STORE_DEPTH / 2);
        frontWallRightLower.castShadow = true;
        frontWallRightLower.receiveShadow = true;
        scene.add(frontWallRightLower);

        const frontWallLeftUpperGeo = new THREE.PlaneGeometry(STORE_WIDTH / 2 - frontWallOffset, wallUpperHeight);
        const frontWallLeftUpperMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });
        const frontWallLeftUpper = new THREE.Mesh(frontWallLeftUpperGeo, frontWallLeftUpperMat);
        frontWallLeftUpper.position.set(-STORE_WIDTH / 4 - frontWallOffset / 2, wallLowerHeight + wallUpperHeight / 2, -STORE_DEPTH / 2);
        frontWallLeftUpper.castShadow = true;
        frontWallLeftUpper.receiveShadow = true;
        scene.add(frontWallLeftUpper);

        const frontWallRightUpperGeo = new THREE.PlaneGeometry(STORE_WIDTH / 2 - frontWallOffset, wallUpperHeight);
        const frontWallRightUpperMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });
        const frontWallRightUpper = new THREE.Mesh(frontWallRightUpperGeo, frontWallRightUpperMat);
        frontWallRightUpper.position.set(STORE_WIDTH / 4 + frontWallOffset / 2, wallLowerHeight + wallUpperHeight / 2, -STORE_DEPTH / 2);
        frontWallRightUpper.castShadow = true;
        frontWallRightUpper.receiveShadow = true;
        scene.add(frontWallRightUpper);

        // Front wall stripe
        const frontStripe = new THREE.Mesh(stripeGeo, stripeMat);
        frontStripe.position.set(0, stripeY + 0.05, -STORE_DEPTH / 2 - 0.01);
        frontStripe.castShadow = true;
        scene.add(frontStripe);

        // Side walls
        const sideWallGeo = new THREE.PlaneGeometry(STORE_DEPTH, wallLowerHeight);
        const sideWallMatLower = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_NAVY });

        const leftWallLower = new THREE.Mesh(sideWallGeo, sideWallMatLower);
        leftWallLower.rotation.y = Math.PI / 2;
        leftWallLower.position.set(-STORE_WIDTH / 2, wallLowerHeight / 2, 0);
        leftWallLower.castShadow = true;
        leftWallLower.receiveShadow = true;
        scene.add(leftWallLower);

        const rightWallLower = new THREE.Mesh(sideWallGeo, sideWallMatLower);
        rightWallLower.rotation.y = -Math.PI / 2;
        rightWallLower.position.set(STORE_WIDTH / 2, wallLowerHeight / 2, 0);
        rightWallLower.castShadow = true;
        rightWallLower.receiveShadow = true;
        scene.add(rightWallLower);

        const sideWallUpperGeo = new THREE.PlaneGeometry(STORE_DEPTH, wallUpperHeight);
        const sideWallMatUpper = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });

        const leftWallUpper = new THREE.Mesh(sideWallUpperGeo, sideWallMatUpper);
        leftWallUpper.rotation.y = Math.PI / 2;
        leftWallUpper.position.set(-STORE_WIDTH / 2, wallLowerHeight + wallUpperHeight / 2, 0);
        leftWallUpper.castShadow = true;
        leftWallUpper.receiveShadow = true;
        scene.add(leftWallUpper);

        const rightWallUpper = new THREE.Mesh(sideWallUpperGeo, sideWallMatUpper);
        rightWallUpper.rotation.y = -Math.PI / 2;
        rightWallUpper.position.set(STORE_WIDTH / 2, wallLowerHeight + wallUpperHeight / 2, 0);
        rightWallUpper.castShadow = true;
        rightWallUpper.receiveShadow = true;
        scene.add(rightWallUpper);

        // Side wall stripes
        const sideStripeGeo = new THREE.PlaneGeometry(STORE_DEPTH, 0.1);
        const leftStripe = new THREE.Mesh(sideStripeGeo, stripeMat);
        leftStripe.rotation.y = Math.PI / 2;
        leftStripe.position.set(-STORE_WIDTH / 2 + 0.01, stripeY + 0.05, 0);
        leftStripe.castShadow = true;
        scene.add(leftStripe);

        const rightStripe = new THREE.Mesh(sideStripeGeo, stripeMat);
        rightStripe.rotation.y = -Math.PI / 2;
        rightStripe.position.set(STORE_WIDTH / 2 - 0.01, stripeY + 0.05, 0);
        rightStripe.castShadow = true;
        scene.add(rightStripe);

        // ===== SHELVING SYSTEM =====

        const genres = ['Horror', 'Drama', 'Action', 'Thriller', 'Sci-Fi', 'Comedy'];
        const genreColors = {
            'Horror': 0x4a0a0a,
            'Drama': 0x3a3a0a,
            'Action': 0x4a2a0a,
            'Thriller': 0x0a0a4a,
            'Sci-Fi': 0x0a3a3a,
            'Comedy': 0x3a3a00,
            'Animation': 0x0a3a0a,
            'Romance': 0x4a0a2a,
            'Documentary': 0x2a2a2a,
            'Western': 0x2a2a2a
        };

        const aislePositions = [-25, -15, -5, 5, 15, 25];
        const shelfLevels = [0.3, 0.9, 1.5];
        const shelfColliders = [];
        let totalCasesPlaced = 0;

        // Aisle shelves
        genres.forEach((genre, idx) => {
            const aisleCenterX = aislePositions[idx];
            const aisleFrontZ = -14;
            const aisleBackZ = 18;
            const aisleLengthZ = aisleBackZ - aisleFrontZ;

            const aisle = new THREE.Group();
            aisle.position.x = aisleCenterX;

            // Support posts
            const supportGeo = new THREE.BoxGeometry(0.3, 1.5, 0.3);
            const supportMat = new THREE.MeshLambertMaterial({ color: DARK_GREY });
            [-10, -2, 6, 14].forEach(z => {
                const post = new THREE.Mesh(supportGeo, supportMat);
                post.position.set(0, 0.75, z);
                post.castShadow = true;
                post.receiveShadow = true;
                aisle.add(post);
            });

            // Shelves (front and back facing)
            const shelfMat = new THREE.MeshLambertMaterial({ color: WOOD_COLOR });
            shelfLevels.forEach(level => {
                const shelfGeo = new THREE.BoxGeometry(1.5, 0.2, aisleLengthZ);
                const shelf = new THREE.Mesh(shelfGeo, shelfMat);
                shelf.position.set(0, level, (aisleFrontZ + aisleBackZ) / 2);
                shelf.castShadow = true;
                shelf.receiveShadow = true;
                aisle.add(shelf);

                // Back panel
                const panelGeo = new THREE.BoxGeometry(1.5, 1.5, 0.05);
                const panelMat = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_NAVY });
                const panel = new THREE.Mesh(panelGeo, panelMat);
                panel.position.set(0, 0.75, (aisleFrontZ + aisleBackZ) / 2 + 0.3);
                panel.castShadow = true;
                panel.receiveShadow = true;
                aisle.add(panel);

                // Place DVD cases on this shelf level
                const genreColor = genreColors[genre] || 0x2a2a2a;
                let currentZ = aisleFrontZ;
                const caseWidth = 0.38;
                const caseHeight = 0.55;
                const caseDepth = 0.05;
                const caseGap = 0.01;
                const caseSpacing = caseWidth + caseGap;

                while (currentZ + caseWidth <= aisleBackZ) {
                    const caseMat = new THREE.MeshBasicMaterial({
                        color: new THREE.Color(genreColor).multiplyScalar(0.8 + Math.random() * 0.4)
                    });
                    const caseGeo = new THREE.BoxGeometry(caseWidth, caseHeight, caseDepth);
                    const dvdCase = new THREE.Mesh(caseGeo, caseMat);
                    dvdCase.position.set(0, level + caseHeight / 2, currentZ + caseWidth / 2);
                    dvdCase.castShadow = true;
                    dvdCase.receiveShadow = true;
                    dvdCase.userData = { genre: genre };
                    aisle.add(dvdCase);
                    totalCasesPlaced++;

                    currentZ += caseSpacing;
                }
            });

            // Genre sign at entrance
            const canvas2D = document.createElement('canvas');
            canvas2D.width = 256;
            canvas2D.height = 128;
            const ctx = canvas2D.getContext('2d');
            ctx.fillStyle = '#003087';
            ctx.fillRect(0, 0, 256, 128);
            ctx.fillStyle = '#FFD600';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(genre.toUpperCase(), 128, 64);

            const texture = new THREE.CanvasTexture(canvas2D);
            const signGeo = new THREE.PlaneGeometry(3, 1.5);
            const signMat = new THREE.MeshLambertMaterial({ map: texture });
            const sign = new THREE.Mesh(signGeo, signMat);
            sign.position.set(0, 2.2, -12);
            sign.castShadow = true;
            sign.receiveShadow = true;
            aisle.add(sign);

            // Fluorescent light for this aisle
            const light = new THREE.PointLight(0xffffff, 0.8, 50);
            light.position.set(0, CEILING_HEIGHT - 0.2, 0);
            light.castShadow = true;
            light.shadow.mapSize.width = 256;
            light.shadow.mapSize.height = 256;
            aisle.add(light);

            scene.add(aisle);

            // Collision box for aisle
            shelfColliders.push({
                position: new THREE.Vector3(aisleCenterX, 0, (aisleFrontZ + aisleBackZ) / 2),
                width: 1.5,
                depth: aisleLengthZ,
                height: 1.5
            });
        });

        // Checkout counter
        const counterGeo = new THREE.BoxGeometry(4, 1, 2);
        const counterMat = new THREE.MeshLambertMaterial({ color: WOOD_COLOR });
        const counter = new THREE.Mesh(counterGeo, counterMat);
        counter.position.set(-10, 0.5, -17);
        counter.castShadow = true;
        counter.receiveShadow = true;
        scene.add(counter);

        // ===== MOVEMENT & CONTROLS =====

        const keys = {};
        const moveVector = new THREE.Vector3();
        const playerRadius = 0.4;
        let isWalking = false;

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // Mouse look
        let yaw = 0;
        let pitch = 0;
        let isPointerLocked = false;

        canvas.addEventListener('click', () => {
            if (!isPointerLocked) {
                canvas.requestPointerLock?.() || canvas.mozRequestPointerLock?.() || canvas.webkitRequestPointerLock?.();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === canvas;
        });

        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                yaw -= e.movementX * 0.001;
                pitch -= e.movementY * 0.001;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.exitPointerLock?.();
            }
        });

        // Collision detection
        function checkCollision(testPos) {
            for (let collider of shelfColliders) {
                const dx = testPos.x - collider.position.x;
                const dz = testPos.z - collider.position.z;

                const halfWidth = collider.width / 2 + playerRadius;
                const halfDepth = collider.depth / 2 + playerRadius;

                if (Math.abs(dx) < halfWidth && Math.abs(dz) < halfDepth) {
                    return true;
                }
            }

            const boundaryPadding = playerRadius + 0.5;
            if (testPos.x < -STORE_WIDTH / 2 + boundaryPadding ||
                testPos.x > STORE_WIDTH / 2 - boundaryPadding ||
                testPos.z < -STORE_DEPTH / 2 + boundaryPadding ||
                testPos.z > STORE_DEPTH / 2 - boundaryPadding) {
                return true;
            }

            return false;
        }

        // ===== INTERACTION & RAYCASTING =====

        const raycaster = new THREE.Raycaster();
        let hoveredCase = null;
        let allCases = [];

        function collectAllCases(node) {
            if (node.userData && node.userData.genre) {
                allCases.push(node);
            }
            if (node.children) {
                node.children.forEach(child => collectAllCases(child));
            }
        }
        scene.traverse(child => collectAllCases(child));

        // Detail panel
        const detailPanel = document.getElementById('detailPanel');
        const detailTitle = document.getElementById('detailTitle');
        const detailGenre = document.getElementById('detailGenre');

        canvas.addEventListener('click', () => {
            if (hoveredCase && hoveredCase.userData.genre) {
                document.exitPointerLock?.();
                detailTitle.textContent = 'DVD Case';
                detailGenre.textContent = hoveredCase.userData.genre;
                detailPanel.style.display = 'flex';
            }
        });

        detailPanel.addEventListener('click', (e) => {
            if (e.target === detailPanel) {
                detailPanel.style.display = 'none';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && detailPanel.style.display === 'flex') {
                detailPanel.style.display = 'none';
            }
        });

        // Mobile detection
        const isMobile = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   window.innerWidth < 768;
        };

        const isMobileDevice = isMobile();
        if (isMobileDevice) {
            document.getElementById('instructions').textContent = 'Left drag to move | Right drag to look';
            document.getElementById('joystick').classList.add('mobile');
        }

        // Joystick for mobile
        let joystickActive = false;
        let joystickX = 0;
        let joystickY = 0;

        const joystick = document.getElementById('joystick');
        const joystickStick = document.getElementById('joystickStick');

        joystick.addEventListener('touchstart', () => { joystickActive = true; });
        joystick.addEventListener('touchend', () => {
            joystickActive = false;
            joystickX = 0;
            joystickY = 0;
            joystickStick.style.transform = 'translate(-50%, -50%)';
        });

        joystick.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const touch = e.touches[0];

            joystickX = (touch.clientX - centerX) / (rect.width / 2);
            joystickY = (touch.clientY - centerY) / (rect.height / 2);

            const distance = Math.sqrt(joystickX * joystickX + joystickY * joystickY);
            if (distance > 1) {
                joystickX /= distance;
                joystickY /= distance;
            }

            const stickX = joystickX * 30;
            const stickY = joystickY * 30;
            joystickStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
        });

        // Touch look
        let touchStartX = 0;
        let touchStartY = 0;

        if (isMobileDevice) {
            document.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    const deltaX = e.touches[0].clientX - touchStartX;
                    const deltaY = e.touches[0].clientY - touchStartY;

                    yaw -= deltaX * 0.0025;
                    pitch -= deltaY * 0.0025;
                    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));

                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            });
        }

        // ===== ANIMATION LOOP =====

        let bobTime = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = Math.min(clock.getDelta(), 0.1);

            // Movement
            moveVector.set(0, 0, 0);
            if (keys['w']) moveVector.z -= 1;
            if (keys['s']) moveVector.z += 1;
            if (keys['a']) moveVector.x -= 1;
            if (keys['d']) moveVector.x += 1;

            if (isMobileDevice && joystickActive) {
                if (Math.abs(joystickX) > 0.1) moveVector.x += joystickX;
                if (Math.abs(joystickY) > 0.1) moveVector.z += joystickY;
            }

            isWalking = moveVector.length() > 0;

            if (moveVector.length() > 0) {
                moveVector.normalize();

                const angle = yaw + Math.atan2(moveVector.x, moveVector.z);
                const speed = 0.04;
                const velocity = new THREE.Vector3(
                    Math.sin(angle) * speed,
                    0,
                    Math.cos(angle) * speed
                );

                // Sliding collision
                const testPosX = camera.position.clone();
                testPosX.x += velocity.x;

                const testPosZ = camera.position.clone();
                testPosZ.z += velocity.z;

                if (!checkCollision(testPosX)) {
                    camera.position.x += velocity.x;
                }

                if (!checkCollision(testPosZ)) {
                    camera.position.z += velocity.z;
                }
            }

            // Camera bob
            if (isWalking) {
                bobTime += deltaTime * 5;
                camera.position.y = 1.7 + Math.sin(bobTime) * 0.05;
            } else {
                camera.position.y = 1.7;
                bobTime = 0;
            }

            // Camera rotation
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Raycasting for hover
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(allCases);

            const genreLabel = document.getElementById('genreLabel');
            if (intersects.length > 0) {
                const dvdCase = intersects[0].object;
                if (hoveredCase !== dvdCase) {
                    hoveredCase = dvdCase;
                    genreLabel.textContent = dvdCase.userData.genre;
                    genreLabel.style.display = 'block';
                }
            } else {
                if (hoveredCase) {
                    hoveredCase = null;
                    genreLabel.style.display = 'none';
                }
            }

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log(`Total DVD cases placed: ${totalCasesPlaced}`);
        animate();
    </script>
</body>
</html>
